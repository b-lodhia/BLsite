<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bhavesh Lodhia</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Josefin+Sans:wght@200;300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --grey: #b0b0b0;
      --bg: #d6d6d6;
      --black: #111111;
      --mid: #888;
      --white: #f5f5f5;
      --card: rgba(255,255,255,0.45);
      --nav-bg: rgba(214,214,214,0.75);
      transition: background 0.3s, color 0.3s;
    }

    body.dark {
      --bg: #141414;
      --black: #f0f0f0;
      --mid: #888;
      --white: #111111;
      --card: rgba(255,255,255,0.05);
      --nav-bg: rgba(20,20,20,0.85);
    }

    body.dark {
      background-color: var(--bg);
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(40,40,40,0.6) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(30,30,30,0.4) 0%, transparent 60%);
    }

    /* DARK MODE TOGGLE */
    .theme-toggle {
      background: none;
      border: 1px solid rgba(0,0,0,0.2);
      cursor: pointer;
      width: 2.2rem;
      height: 2.2rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      transition: border-color 0.2s, transform 0.2s;
      color: var(--black);
      flex-shrink: 0;
    }
    .theme-toggle:hover { transform: scale(1.1); }
    body.dark .theme-toggle { border-color: rgba(255,255,255,0.2); }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--bg);
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(180,180,180,0.5) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(150,150,150,0.3) 0%, transparent 60%);
      font-family: 'Josefin Sans', sans-serif;
      color: var(--black);
      min-height: 100vh;
      transition: background-color 0.3s, color 0.3s;
    }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.4rem 4rem;
      background: var(--nav-bg);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0,0,0,0.08);
    }

    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--black);
      text-decoration: none;
    }

    .nav-links { display: flex; gap: 2.5rem; list-style: none; }
    .nav-links a {
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--black);
      text-decoration: none;
      opacity: 0.65;
      transition: opacity 0.2s;
    }
    .nav-links a:hover { opacity: 1; }

    /* HERO */
    .hero {
      min-height: 100vh;
      display: flex; flex-direction: column;
      justify-content: center; align-items: flex-start;
      padding: 8rem 4rem 4rem;
      position: relative;
      overflow: hidden;
    }

    .hero-label {
      font-size: 0.68rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeUp 0.8s 0.2s forwards;
    }

    .hero h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(4rem, 10vw, 9rem);
      font-weight: 300;
      line-height: 0.95;
      letter-spacing: -0.02em;
      color: var(--black);
      opacity: 0;
      animation: fadeUp 0.9s 0.4s forwards;
    }

    .hero h1 em {
      font-style: italic;
      color: var(--mid);
    }

    .hero-sub {
      margin-top: 2.5rem;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--mid);
      max-width: 28rem;
      line-height: 2;
      opacity: 0;
      animation: fadeUp 0.9s 0.65s forwards;
    }

    .hero-cta {
      margin-top: 3rem;
      opacity: 0;
      animation: fadeUp 0.9s 0.85s forwards;
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .btn {
      display: inline-block;
      padding: 0.9rem 2.4rem;
      background: var(--black);
      color: var(--white);
      font-family: 'Josefin Sans', sans-serif;
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-decoration: none;
      border: 1px solid var(--black);
      transition: background 0.25s, color 0.25s;
      cursor: pointer;
    }
    .btn:hover { background: transparent; color: var(--black); }

    .btn-outline {
      background: transparent;
      color: var(--black);
      margin-left: 0;
    }
    .btn-outline:hover { background: var(--black); color: var(--white); }

    .hero-decor {
      position: absolute;
      right: -4rem; top: 50%;
      transform: translateY(-50%);
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(12rem, 22vw, 22rem);
      font-weight: 300;
      color: rgba(0,0,0,0.04);
      letter-spacing: -0.05em;
      user-select: none;
      pointer-events: none;
      white-space: nowrap;
    }

    /* SECTIONS */
    section {
      padding: 7rem 4rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    .section-label {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 0.8rem;
    }

    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.2rem, 5vw, 4rem);
      font-weight: 300;
      line-height: 1.1;
      margin-bottom: 3rem;
      color: var(--black);
    }

    /* ABOUT */
    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: start;
    }

    .about-text p {
      font-size: 0.9rem;
      line-height: 2;
      color: #444;
      margin-bottom: 1.2rem;
    }

    .about-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    .stat-card {
      background: var(--card);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(0,0,0,0.08);
      padding: 2rem 1.5rem;
      transition: transform 0.25s, box-shadow 0.25s;
    }
    .stat-card:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(0,0,0,0.1); }

    .stat-number {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3rem;
      font-weight: 300;
      color: var(--black);
      line-height: 1;
    }

    .stat-label {
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--mid);
      margin-top: 0.5rem;
    }

    /* DIVIDER */
    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(0,0,0,0.15), transparent);
      margin: 0 4rem;
      max-width: calc(1100px - 8rem);
    }

    /* CONTACT */
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      gap: 5rem;
      align-items: start;
    }

    .contact-info p {
      font-size: 0.85rem;
      line-height: 2;
      color: #555;
      margin-bottom: 2rem;
    }

    .social-links {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      margin-top: 2rem;
    }

    .social-link {
      display: flex;
      align-items: center;
      gap: 1rem;
      text-decoration: none;
      color: var(--black);
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.6;
      transition: opacity 0.2s, gap 0.2s;
    }
    .social-link:hover { opacity: 1; gap: 1.4rem; }

    .social-link::before {
      content: '';
      display: block;
      width: 2rem;
      height: 1px;
      background: var(--black);
      transition: width 0.2s;
    }
    .social-link:hover::before { width: 2.8rem; }

    /* FORM */
    .contact-form { display: flex; flex-direction: column; gap: 1.2rem; }

    .form-group { display: flex; flex-direction: column; gap: 0.4rem; }

    .form-group label {
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--mid);
    }

    .form-group input,
    .form-group textarea {
      background: rgba(255,255,255,0.5);
      border: 1px solid rgba(0,0,0,0.12);
      padding: 0.85rem 1rem;
      font-family: 'Josefin Sans', sans-serif;
      font-size: 0.85rem;
      color: var(--black);
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      resize: none;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      border-color: var(--black);
      background: rgba(255,255,255,0.75);
    }

    .form-success {
      display: none;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      color: #555;
      padding: 1rem;
      border: 1px solid rgba(0,0,0,0.15);
      background: rgba(255,255,255,0.5);
      text-align: center;
    }

    /* FOOTER */
    footer {
      border-top: 1px solid rgba(0,0,0,0.1);
      padding: 2.5rem 4rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    footer p {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--mid);
    }

    /* ANIMATIONS */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      nav { padding: 1.2rem 1.5rem; }
      .nav-links { gap: 1.5rem; }
      .hero { padding: 7rem 1.5rem 3rem; }
      section { padding: 5rem 1.5rem; }
      .about-grid, .contact-grid { grid-template-columns: 1fr; gap: 2.5rem; }
      footer { flex-direction: column; gap: 1rem; text-align: center; padding: 2rem 1.5rem; }
      .hero-decor { display: none; }
      .divider { margin: 0 1.5rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="#" class="nav-logo">BL</a>
    <ul class="nav-links">
    </ul>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">🌙</button>
  </nav>

  <!-- HERO -->
  <div class="hero">
    <p class="hero-label">Personal Portfolio</p>
    <h1>Bhavesh<br/><em>Lodhia</em></h1>
    <p class="hero-sub">Welcome to my personal space — see links below to learn more about me and get in touch.</p>
    <div class="hero-cta">
      <a href="https://www.linkedin.com/in/b-lodhia" class="btn" target="_blank">Connect on LinkedIn</a>
      <a href="https://www.instagram.com/blodhia" class="btn btn-outline" target="_blank">Follow on Instagram</a>
    </div>
    <div class="hero-decor">BL</div>
  </div>



  <footer>
    <p>© 2026 Bhavesh Lodhia</p>
    <p>Built with care</p>
  </footer>



  <script>
    const toggle = document.getElementById('themeToggle');
    const body = document.body;

    if (localStorage.getItem('theme') === 'dark') {
      body.classList.add('dark');
      toggle.textContent = '☀️';
    }

    toggle.addEventListener('click', () => {
      body.classList.toggle('dark');
      const isDark = body.classList.contains('dark');
      toggle.textContent = isDark ? '☀️' : '🌙';
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });
  </script>

</body>
</html>
